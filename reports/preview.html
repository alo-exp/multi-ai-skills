<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js" integrity="sha384-y49Zu59jZHJL/PLKgZPv3k2WI9c0Yp3pWB76V8OBVCb0QBKS8l4Ff3YslzHVX76Y" crossorigin="anonymous"></script>
<style>
/* ── Ālo Design System tokens (inlined) ──────────────────────────────── */
:root {
  --color-accent-primary:    #4f46e5;
  --color-accent-light:      #6366f1;
  --color-accent-secondary:  #7c3aed;
  --color-accent-mid:        #a855f7;
  --color-accent-tertiary:   #db2777;
  --color-accent-pink-light: #ec4899;
  --color-accent-green:      #059669;
  --color-accent-amber:      #d97706;
  --color-accent-primary-rgb: 79, 70, 229;
  --color-accent-light-rgb:   99, 102, 241;
  --gradient-brand:           linear-gradient(135deg, #4f46e5, #7c3aed, #db2777);
  --gradient-indigo-violet:   linear-gradient(135deg, #4f46e5, #7c3aed);
  --color-success: #059669;
  --color-warning: #d97706;
  --color-error:   #dc2626;
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   20px;
  --radius-xl:   28px;
  --radius-pill: 999px;
  --transition-default: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
  /* Light mode (default) */
  --color-bg-rgb:         248, 249, 252;
  --color-bg:             #f8f9fc;
  --color-surface:        #ffffff;
  --color-border:         #e2e8f0;
  --color-text-primary:   #0f172a;
  --color-text-secondary: #475569;
  --color-text-muted:     #94a3b8;
  --shadow-card:          0 4px 24px rgba(15,23,42,0.08);
  --shadow-btn:           0 4px 20px rgba(99,102,241,0.25);
  --shadow-btn-hover:     0 8px 30px rgba(99,102,241,0.4);
}
[data-theme="dark"] {
  --color-bg-rgb:         10, 10, 15;
  --color-bg:             #0a0a0f;
  --color-surface:        #12121a;
  --color-border:         #1e293b;
  --color-text-primary:   #e2e8f0;
  --color-text-secondary: #94a3b8;
  --color-text-muted:     #475569;
  --shadow-card:          0 20px 60px rgba(0,0,0,0.4);
  --shadow-btn:           0 4px 20px rgba(99,102,241,0.3);
  --shadow-btn-hover:     0 8px 30px rgba(99,102,241,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif;
       background: var(--color-bg); color: var(--color-text-primary); line-height: 1.6;
       transition: var(--transition-default); }

/* ── Sidebar ── */
#sidebar { position: fixed; top: 0; left: 0; width: 260px; height: 100vh;
           background: var(--color-surface); color: var(--color-text-primary);
           overflow-y: auto; padding: 16px;
           font-size: 13px; z-index: 100;
           border-right: 1px solid var(--color-border);
           transition: var(--transition-default); }
#sidebar h3 { color: var(--color-accent-light); margin-bottom: 12px; font-size: 10px;
              text-transform: uppercase; letter-spacing: 1.4px; font-weight: 700; }
#sidebar ul { list-style: none; }
#sidebar li { margin: 3px 0; }
#sidebar a { color: var(--color-text-secondary); text-decoration: none; display: block;
             padding: 4px 8px; border-radius: var(--radius-sm);
             transition: var(--transition-default); font-size: 12px; }
#sidebar a:hover, #sidebar a.active { color: var(--color-text-primary);
  background: rgba(var(--color-accent-primary-rgb), 0.08); }

/* Dark mode toggle */
#themeToggle {
  display: flex; align-items: center; gap: 6px; padding: 6px 10px;
  margin-bottom: 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--color-border); background: transparent;
  color: var(--color-text-muted); cursor: pointer; font-size: 10.5px;
  font-weight: 600; width: 100%; transition: var(--transition-default);
  font-family: 'Inter', system-ui, sans-serif;
  text-transform: uppercase; letter-spacing: 0.6px;
}
#themeToggle:hover { background: rgba(var(--color-accent-primary-rgb), 0.06);
                     color: var(--color-text-primary);
                     border-color: rgba(var(--color-accent-primary-rgb), 0.3); }
#themeToggleIcon { font-size: 14px; }

/* ── Main content area ── */
#main { margin-left: 260px; padding: 120px 48px 40px; max-width: 1100px; }

/* ── Headings ── */
#content h1 { font-size: 2em; border-bottom: 2px solid var(--color-border); padding-bottom: 12px;
              margin: 24px 0 16px; color: var(--color-accent-primary); font-weight: 800; }
#content h2 { font-size: 1.5em; border-bottom: 1px solid var(--color-border); padding-bottom: 8px;
              margin: 32px 0 12px; color: var(--color-accent-primary); font-weight: 700; }
#content h3 { font-size: 1.2em; margin: 24px 0 8px; color: var(--color-accent-secondary);
              font-weight: 700; }
#content h4 { font-size: 1em; margin: 16px 0 6px; color: var(--color-accent-secondary);
              font-weight: 600; }
#content p { margin: 0 0 12px; color: var(--color-text-primary); }
#content ul, #content ol { margin: 0 0 12px 24px; }
#content li { margin: 4px 0; color: var(--color-text-primary); }
#content th { border: none; }
#content td { border: none; }
#content code { background: rgba(var(--color-accent-primary-rgb), 0.07);
                padding: 2px 6px; border-radius: 4px;
                font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
                font-size: 0.875em; color: var(--color-accent-light); }
#content pre { background: var(--color-surface); color: var(--color-text-primary);
               padding: 16px; border-radius: var(--radius-md);
               overflow-x: auto; margin: 12px 0;
               border: 1px solid var(--color-border); }
#content pre code { background: none; color: inherit; padding: 0; }
#content blockquote { border-left: 4px solid var(--color-accent-primary); padding: 8px 16px;
                      background: rgba(var(--color-accent-primary-rgb), 0.06);
                      margin: 12px 0; color: var(--color-text-secondary);
                      border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
#content strong { font-weight: 600; }
#content em { font-style: italic; }
#content hr { border: none; border-top: 1px solid var(--color-border); margin: 32px 0; }

/* ── Info cards — Shortlist Profiles & Future Outlook ── */
.info-card { border: 1px solid var(--color-border); border-radius: var(--radius-md);
             margin: 10px 0; overflow: hidden; background: var(--color-surface);
             transition: var(--transition-default); }
.info-card-header { display: flex; align-items: center; justify-content: space-between;
                    padding: 11px 16px; background: var(--color-surface); cursor: pointer;
                    font-weight: 600; font-size: 13.5px; color: var(--color-text-primary);
                    user-select: none; transition: var(--transition-default); }
.info-card-header:hover { background: rgba(var(--color-accent-primary-rgb), 0.05); }
.info-card-toggle { font-size: 26px; color: var(--color-text-muted); flex-shrink: 0;
                    padding-left: 10px; line-height: 1; }
.info-card-body { display: none; padding: 12px 18px 16px; font-size: 14px;
                  color: var(--color-text-secondary); }
.info-card-body.open { display: block; }

#stats { font-size: 11px; color: var(--color-text-muted); margin-top: 8px; padding-top: 8px;
         border-top: 1px solid var(--color-border); }

/* ── Chart frames ── */
.chart-frame { background: var(--color-surface); border: 1px solid var(--color-border);
               border-radius: var(--radius-md); padding: 28px 32px; margin: 20px 0 28px;
               box-shadow: var(--shadow-card);
               opacity: 0; transform: translateY(22px);
               transition: opacity .55s ease, transform .55s ease;
               will-change: opacity, transform; }
.chart-frame.in-view { opacity: 1; transform: translateY(0); }
.chart-title { font-size: 11px; font-weight: 700; text-transform: uppercase;
               letter-spacing: 1px; color: var(--color-text-muted); margin-bottom: 6px; }
.chart-subtitle { font-size: 12px; color: var(--color-text-muted); margin-bottom: 20px; }
.chart-source-table { margin-top: 20px; }
.chart-source-table summary { font-size: 12px; color: var(--color-accent-light); cursor: pointer; }
.chart-source-table table { margin-top: 8px; }
.wave-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; font-size: 12px;
               color: var(--color-text-secondary); }
.wave-legend span { display: flex; align-items: center; gap: 5px; }
.wave-legend i { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
.vc-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; font-size: 12px;
             color: var(--color-text-secondary); }
.vc-legend span { display: flex; align-items: center; gap: 5px; }
.vc-legend i { display: inline-block; width: 28px; height: 3px; border-radius: 2px; }
.vc-legend .dashed { border-top: 2px dashed currentColor; background: transparent; height: 0; }

/* ── Solution Nav ── */
#solutionNav {
  position: fixed; top: 0; left: 260px; right: 0; z-index: 10000;
  background: rgba(var(--color-bg-rgb), 0.94);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--color-border);
  padding: 8px 20px 8px;
  display: flex; flex-direction: column; gap: 4px;
  transition: var(--transition-default);
}
.snav-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  overflow-x: auto; scrollbar-width: none; padding: 1px 0;
}
.snav-row::-webkit-scrollbar { display: none; }
.snav-label {
  font-size: 9.5px; font-weight: 700; color: var(--color-accent-light);
  letter-spacing: 1.2px; min-width: 90px; flex-shrink: 0; text-transform: uppercase;
}
.snav-btn {
  font-size: 10.5px; padding: 4px 12px; border-radius: var(--radius-pill);
  border: 1px solid rgba(var(--color-accent-primary-rgb), 0.2);
  background: rgba(var(--color-accent-primary-rgb), 0.05);
  color: var(--color-text-secondary); cursor: pointer; white-space: nowrap;
  transition: var(--transition-default); flex-shrink: 0;
  font-family: 'Inter', system-ui, sans-serif;
}
.snav-btn:hover {
  border-color: rgba(var(--color-accent-primary-rgb), 0.4);
  background: rgba(var(--color-accent-primary-rgb), 0.1);
  color: var(--color-text-primary);
}
.snav-btn.active {
  background: var(--gradient-indigo-violet);
  border-color: transparent; color: #fff; font-weight: 600;
  box-shadow: 0 2px 8px rgba(var(--color-accent-primary-rgb), 0.3);
}
.snav-doc-btn {
  border-color: rgba(5, 150, 105, 0.3);
  background: rgba(5, 150, 105, 0.06);
}
.snav-doc-btn:hover {
  border-color: rgba(5, 150, 105, 0.5);
  background: rgba(5, 150, 105, 0.12);
  color: var(--color-text-primary);
}
#sidebarFooter {
  margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--color-border);
  font-size: 11px;
}
#sidebarFooter a {
  color: var(--color-text-muted); display: block; padding: 4px 0;
  text-decoration: none; transition: color .2s;
}
#sidebarFooter a:hover { color: var(--color-accent-light); }

/* ── Reading Progress Bar ── */
#readProgress { position: fixed; top: 82px; left: 260px; right: 0; height: 2px;
                width: auto; background: transparent; z-index: 9999; pointer-events: none; }
#readProgressBar { position: absolute; top: 0; left: 0; height: 2px; width: 0%;
                   background: var(--gradient-brand); transition: width .1s linear; }

/* ── Sticky Breadcrumb ── */
#breadcrumb { position: fixed; top: 83px; left: 260px; right: 0; height: 32px;
              background: rgba(var(--color-bg-rgb), 0.97);
              backdrop-filter: blur(8px); z-index: 9998;
              display: flex; align-items: center; padding: 0 28px;
              font-size: 12px; letter-spacing: 0.3px; color: var(--color-text-muted);
              border-bottom: 1px solid var(--color-border);
              transition: var(--transition-default); }

/* ── Section Colour Coding — 8 brand palette colours ── */
.sec-color-0 h2, h2.sec-color-0 { border-left: 4px solid #4f46e5; padding-left: 10px; }
.sec-color-1 h2, h2.sec-color-1 { border-left: 4px solid #059669; padding-left: 10px; }
.sec-color-2 h2, h2.sec-color-2 { border-left: 4px solid #db2777; padding-left: 10px; }
.sec-color-3 h2, h2.sec-color-3 { border-left: 4px solid #7c3aed; padding-left: 10px; }
.sec-color-4 h2, h2.sec-color-4 { border-left: 4px solid #d97706; padding-left: 10px; }
.sec-color-5 h2, h2.sec-color-5 { border-left: 4px solid #6366f1; padding-left: 10px; }
.sec-color-6 h2, h2.sec-color-6 { border-left: 4px solid #a855f7; padding-left: 10px; }
.sec-color-7 h2, h2.sec-color-7 { border-left: 4px solid #ec4899; padding-left: 10px; }
a.sec-color-0 { border-left: 3px solid #4f46e5; padding-left: 6px; }
a.sec-color-1 { border-left: 3px solid #059669; padding-left: 6px; }
a.sec-color-2 { border-left: 3px solid #db2777; padding-left: 6px; }
a.sec-color-3 { border-left: 3px solid #7c3aed; padding-left: 6px; }
a.sec-color-4 { border-left: 3px solid #d97706; padding-left: 6px; }
a.sec-color-5 { border-left: 3px solid #6366f1; padding-left: 6px; }
a.sec-color-6 { border-left: 3px solid #a855f7; padding-left: 6px; }
a.sec-color-7 { border-left: 3px solid #ec4899; padding-left: 6px; }
#content h2[class*="sec-color"] {
  background: rgba(var(--color-bg-rgb), 0.5);
  padding: 12px 14px 8px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

/* ── Collapsible Sub-sections ── */
#content h3.collapsible { cursor: pointer; user-select: none; }
#content h3.collapsible::before { content: '▴ '; font-size: 1.1em; color: var(--color-accent-light); }
#content h3.collapsible.is-closed::before { content: '▾ '; }
.collapsible-body { overflow: hidden; transition: max-height .3s ease; }

/* ── Inline Callout Boxes ── */
.callout { border-left: 4px solid; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
           padding: 10px 16px; margin: 14px 0; font-size: 14px;
           transition: var(--transition-default); }
.callout strong:first-child { display: block; font-size: 11px; letter-spacing: .5px;
                              text-transform: uppercase; margin-bottom: 4px; }
.callout-insight { background: rgba(79, 70, 229, 0.07);  border-color: #4f46e5; }
.callout-signal  { background: rgba(217,119,  6, 0.08);  border-color: #d97706; }
.callout-risk    { background: rgba(220, 38, 38, 0.07);  border-color: #dc2626; }
.callout-stat    { background: rgba(  5,150,105, 0.07);  border-color: #059669; }
.callout-default { background: var(--color-surface);     border-color: var(--color-border); }

/* ── Trend Cards ── */
.trend-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
               padding: 8px 0 16px; }
.trend-card { background: var(--color-surface); border: 1px solid var(--color-border);
              border-radius: var(--radius-md); padding: 16px 14px;
              transition: var(--transition-default); position: relative; overflow: hidden; }
.trend-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
                      background: var(--gradient-brand); opacity: 0; transition: opacity .25s ease; }
.trend-card:hover { border-color: rgba(var(--color-accent-primary-rgb), 0.3);
                    box-shadow: var(--shadow-card); transform: translateY(-2px); }
.trend-card:hover::before { opacity: 1; }
.tc-icon { font-size: 24px; margin-bottom: 8px; }
.tc-title { font-size: 13px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 6px; }
.tc-body { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }

/* ── Vendor Profile Cards ── */
.vendor-card { border: 1px solid var(--color-border); border-radius: var(--radius-md);
               margin: 16px 0; overflow: hidden; background: var(--color-surface);
               transition: var(--transition-default); position: relative; }
.vendor-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
                       background: var(--gradient-brand); opacity: 0; transition: opacity .25s ease; }
.vendor-card:hover { border-color: rgba(var(--color-accent-primary-rgb), 0.3);
                     box-shadow: var(--shadow-card); }
.vendor-card:hover::before { opacity: 1; }
.vc-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
             background: var(--color-surface); cursor: pointer;
             transition: var(--transition-default); }
.vc-header:hover { background: rgba(var(--color-accent-primary-rgb), 0.04); }
.vc-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex;
             align-items: center; justify-content: center; font-size: 12px;
             font-weight: 700; color: #fff; flex-shrink: 0; }
.vc-name { font-size: 15px; font-weight: 700; flex: 1; color: var(--color-text-primary); }
.vc-toggle { font-size: 28px; color: var(--color-text-muted); padding: 4px 10px;
             display: inline-block; line-height: 1; }
.vc-tags { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px 0; }
.vc-tag { font-size: 10px; padding: 2px 10px; border-radius: var(--radius-pill);
          background: rgba(var(--color-accent-light-rgb), 0.12);
          color: var(--color-accent-light); font-weight: 600; }
.vc-body { padding: 0 16px 16px; color: var(--color-text-secondary); }
.vc-body.vc-collapsed { display: none; }

/* ── Filterable Vendor View ── */
.vfbtn { font-size: 11px; padding: 4px 12px; border-radius: var(--radius-pill);
         border: 1px solid var(--color-border); background: var(--color-surface);
         cursor: pointer; color: var(--color-text-primary);
         transition: var(--transition-default); font-family: 'Inter', system-ui, sans-serif; }
.vfbtn.active { background: var(--gradient-indigo-violet); color: #fff;
                border-color: transparent;
                box-shadow: 0 2px 8px rgba(var(--color-accent-primary-rgb), 0.25); }
.vfbtn:hover:not(.active) { background: rgba(var(--color-accent-primary-rgb), 0.06);
                             border-color: rgba(var(--color-accent-primary-rgb), 0.3); }

/* ── Vendor Name Links ── */
.vname-link { cursor: pointer; text-decoration: underline dotted;
              text-decoration-color: rgba(var(--color-accent-primary-rgb), 0.4);
              text-underline-offset: 2px; color: inherit; }

/* ── Export buttons ── */
#exportBar {
  position: fixed; bottom: 24px; right: 24px; z-index: 1001;
  display: flex; align-items: center; gap: 10px;
}
.export-btn {
  color: #0f172a; border: 1px solid var(--color-border); padding: 10px 20px; border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: #ffffff; box-shadow: none;
  display: flex; align-items: center; justify-content: center; gap: 6px; line-height: 1;
  transition: background 0.2s ease; white-space: nowrap;
  font-family: 'Inter', system-ui, sans-serif;
}
.export-btn:hover { background: #f1f5f9; }
.export-btn .btn-icon { font-size: 15px; }

/* ── Toast notification ── */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
         background: var(--color-surface); color: var(--color-text-primary);
         border: 1px solid var(--color-border);
         padding: 8px 16px; border-radius: var(--radius-md); font-size: 13px;
         z-index: 10001; opacity: 1; transition: opacity .5s; pointer-events: none;
         box-shadow: var(--shadow-card); }
.toast.fade { opacity: 0; }

/* ── Vendor Comparison Drawer ── */
#compareBtn { background: #ffffff; color: #0f172a;
              padding: 10px 20px; border-radius: var(--radius-pill);
              cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid var(--color-border);
              box-shadow: none;
              transition: background 0.2s ease;
              display: flex; align-items: center; gap: 6px; white-space: nowrap;
              font-family: 'Inter', system-ui, sans-serif; }
#compareBtn:hover { background: #f1f5f9; }
#compareBadge { display: inline-flex; align-items: center; justify-content: center;
                width: 18px; height: 18px; background: var(--color-accent-primary);
                color: #ffffff;
                border-radius: 50%; font-size: 10px; margin-left: 6px; }
.compare-drawer { position: fixed; bottom: 72px; right: 24px; width: 560px;
                  max-height: 70vh; overflow-y: auto; background: var(--color-surface);
                  border: 1px solid var(--color-border); border-radius: var(--radius-lg);
                  padding: 20px; z-index: 999; box-shadow: var(--shadow-card); display: none;
                  transition: var(--transition-default); }
.compare-drawer.open { display: block; }

/* ── Pros & Cons Grid ── */
.pros-cons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; margin: 12px 0; }
.pros-col strong, .cons-col strong {
  display: block; font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px;
}
.pros-col strong { color: var(--color-success); }
.cons-col strong { color: var(--color-error); }

(function() {

  function updateToggleUI() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const icon  = document.getElementById('themeToggleIcon');
    const label = document.getElementById('themeToggleLabel');
    if (icon)  icon.textContent  = isDark ? '🌙' : '☀️';
    if (label) label.textContent = isDark ? 'Dark Mode' : 'Light Mode';
  }
  document.addEventListener('DOMContentLoaded', () => {
    updateToggleUI();
    document.getElementById('themeToggle').addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);

let LINK_PAIRS = _DEFAULT_LINK_PAIRS;
function linkify() {
  const sorted = [...LINK_PAIRS].sort((a, b) => b[0].length - a[0].length);
  const lu = new Map(sorted.map(([t, u]) => [t, u]));
  const pat = sorted.map(([t]) => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
  const re = new RegExp(`\\b(${pat})\\b`, 'g');
  const content = document.getElementById('content');
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      let el = node.parentElement;
      while (el && el !== content) {
        if (['A','CODE','PRE','SCRIPT','STYLE','H1','H2','H3','H4'].includes(el.tagName))
          return NodeFilter.FILTER_REJECT;
        el = el.parentElement;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) nodes.push(n);
  for (const tn of nodes) {
    const txt = tn.textContent;
    re.lastIndex = 0;
    if (!re.test(txt)) continue;
    re.lastIndex = 0;
    const html = txt.replace(re, m => {
      const url = lu.get(m);
      return url
        ? `<a href="${url}" target="_blank" rel="noopener" ` +
          `style="color:inherit;text-decoration-color:rgba(79,70,229,0.4);text-underline-offset:2px;">${m}</a>`
        : m;
    });
    if (html !== txt) {
      const sp = document.createElement('span');
      sp.innerHTML = html;
      tn.parentNode.replaceChild(sp, tn);
    }
  }
}

          textShadowColor: 'rgba(255,255,255,0.9)',
          textShadowBlur: 4,
        },
      },
    },
    plugins: [{
      id: 'gmqQuadrants',
      beforeDraw(chart) {
        const { ctx, chartArea: { left, right, top, bottom, width, height } } = chart;
        const mx = left + width  * 0.5;
        const my = top  + height * 0.5;
        // Gartner MQ exact quadrant positions:
        // Top-left=Challengers, Top-right=Leaders, Bottom-left=Niche Players, Bottom-right=Visionaries
        const regions = [
          { x1:mx, y1:top,  x2:right, y2:my,    fill:'rgba(79,70,229,0.06)',   label:'LEADERS',      lx:right-8, ly:top+14,   align:'right' },
          { x1:left,y1:top, x2:mx,    y2:my,     fill:'rgba(124,58,237,0.06)', label:'CHALLENGERS',  lx:left+8,  ly:top+14,   align:'left'  },
          { x1:mx, y1:my,   x2:right, y2:bottom, fill:'rgba(217,119,6,0.06)',  label:'VISIONARIES',  lx:right-8, ly:bottom-8, align:'right' },
          { x1:left,y1:my,  x2:mx,    y2:bottom, fill:'rgba(148,163,184,0.08)',label:'NICHE PLAYERS',lx:left+8,  ly:bottom-8, align:'left'  },
        ];
        regions.forEach(r => {
          ctx.save();
          ctx.fillStyle = r.fill;
          ctx.fillRect(r.x1, r.y1, r.x2-r.x1, r.y2-r.y1);
          ctx.font = 'bold 10px "Inter", system-ui, sans-serif';
          ctx.fillStyle = 'rgba(0,0,0,0.18)';
          ctx.textAlign = r.align;
          ctx.fillText(r.label, r.lx, r.ly);
          ctx.restore();
        });
        ctx.save();
        ctx.setLineDash([5,4]);
        ctx.strokeStyle = 'rgba(148,163,184,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(mx, top); ctx.lineTo(mx, bottom); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(left, my); ctx.lineTo(right, my); ctx.stroke();
        ctx.restore();
      }
    }]
  });
  _charts.push(g);
  window._gmqChart = g;
}

// ─── 3B: Forrester Wave ─────────────────────────────────────────────────────
function injectWave(anchorH3) {
  if (document.getElementById('waveChart')) return; // prevent duplicate injection

  const legendHTML = WAVE_DATA.map((d, i) => `
    <span data-wave-idx="${i}" style="display:flex;align-items:center;gap:5px;font-size:12px;
          color:var(--color-text-secondary);

                   background:${WAVE_COLORS[i]};border:2px solid ${WAVE_COLORS[i]}88;"></span>
      ${d.label}
    </span>`).join('');

  const wrap = document.createElement('div');
  wrap.className = 'chart-frame';
  wrap.innerHTML = `
    <div class="chart-title">${_chartCfg.titles.wave}</div>
    <div class="chart-subtitle">
      X-axis: Strength of Strategy &nbsp;|&nbsp; Y-axis: Strength of Offering &nbsp;|&nbsp;
      Bubble size = Market Presence &nbsp;·&nbsp; Strong=4 · Good=3 · Moderate=2
    </div>
    <div style="position:relative;height:480px"><canvas id="waveChart"></canvas></div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;">${legendHTML}</div>`;

  const tbl = findNextTable(anchorH3);
  if (tbl) tbl.style.display = 'none';
  anchorH3.after(wrap);

  // Forrester convention: X = Strategy, Y = Offering
  const bubbleR = { 4: 26, 3: 18, 2: 13, 1: 8 };
  const datasets = WAVE_DATA.map((d, i) => ({
    label: d.label,
    data: [{ x: d.strategy, y: d.offering, r: bubbleR[d.presence] }],
    backgroundColor: WAVE_COLORS[i] + '66',
    borderColor:     WAVE_COLORS[i],
    borderWidth: 2,
  }));

  const ctx = document.getElementById('waveChart').getContext('2d');
  const c = new Chart(ctx, {
    type: 'bubble',
    data: { datasets },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      // Extra top padding so zone labels render above the chart area
      layout: { padding: { top: 38, right: 20, bottom: 10, left: 10 } },
      scales: {
        x: {
          min: 0.5, max: 4.9,
          title: { display: true, text: 'Strength of Strategy  (1=Emerging → 4=Strong)',
                   font: { size: 11 }, color: '#94a3b8' },
          grid: { color: 'rgba(148,163,184,0.2)' },
          ticks: {
            stepSize: 1,
            callback: v => (['','Emerging','Moderate','Good','Strong'][v] || ''),
          },
        },
        y: {
          min: 0.5, max: 4.9,
          title: { display: true, text: 'Strength of Offering  (1=Emerging → 4=Strong)',
                   font: { size: 11 }, color: '#94a3b8' },
          grid: { color: 'rgba(148,163,184,0.2)' },
          ticks: {
            stepSize: 1,
            callback: v => (['','Emerging','Moderate','Good','Strong'][v] || ''),
          },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label} · Strategy:${ctx.raw.x} Offering:${ctx.raw.y}`,
          }
        },
        datalabels: {
          formatter: (v, ctx) => ctx.dataset.label,
          font: { size: 10, weight: '600' },
          color: (ctx) => WAVE_COLORS[ctx.datasetIndex],
          anchor: 'center', align: 'center',
          textShadowColor: 'rgba(255,255,255,0.98)',
          textShadowBlur: 6,
        },
      },
    },
    plugins: [{
      id: 'waveArcZones',
      // Concentric arc zones centred at bottom-left corner, like a real Forrester Wave
      beforeDraw(chart) {
        const { ctx, chartArea: { left, top, bottom, width, height } } = chart;
        ctx.save();
        ctx.beginPath();
        ctx.rect(left, top, width, height);
        ctx.clip();

        const cx = left, cy = bottom;             // arc origin = bottom-left of plot area
        const diag = Math.hypot(width, height);
        const r1 = diag * 0.37;                   // Contenders / Strong Performers boundary
        const r2 = diag * 0.67;                   // Strong Performers / Leaders boundary

        // Fill entire area = Leaders (deepest blue, upper-right quadrant)
        ctx.fillStyle = 'rgba(79,70,229,0.12)';
        ctx.fillRect(left, top, width, height);

        // Overpaint up to r2 = Strong Performers + Contenders (medium)
        ctx.fillStyle = 'rgba(99,102,241,0.08)';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r2, -Math.PI / 2, 0);    // sweep from straight-up to straight-right
        ctx.closePath();
        ctx.fill();

        // Overpaint up to r1 = Contenders only (near-white)
        ctx.fillStyle = 'rgba(226,232,240,0.6)';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r1, -Math.PI / 2, 0);
        ctx.closePath();
        ctx.fill();

        // Arc boundary lines
        ctx.strokeStyle = 'rgba(99,102,241,0.25)';
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        for (const r of [r1, r2]) {
          ctx.beginPath();
          ctx.arc(cx, cy, r, -Math.PI / 2, 0);
          ctx.stroke();
        }
        ctx.restore();
      },
      // Zone labels rendered above the chart area (inside the top padding)
      afterDraw(chart) {
        const { ctx, chartArea: { left, top, width } } = chart;
        ctx.save();
        ctx.font = 'bold 10px "Inter", system-ui, sans-serif';
        ctx.fillStyle = 'rgba(79,70,229,0.55)';
        ctx.textAlign = 'center';
        ctx.fillText('CONTENDERS',        left + width * 0.14, top - 16);
        ctx.fillText('STRONG PERFORMERS', left + width * 0.50, top - 16);
        ctx.fillText('LEADERS',           left + width * 0.86, top - 16);
        ctx.restore();
      }
    }]
  });
  _charts.push(c);
  window._waveChart = c;

  // ── Wave legend hover ──────────────────────────────────────────────────────
  let _waveHovIdx = -1;
  function applyWaveHover(idx) {
    if (idx === _waveHovIdx) return;
    _waveHovIdx = idx;
    c.data.datasets.forEach((ds, i) => {
      if (idx === -1) {
        ds.backgroundColor = WAVE_COLORS[i] + '66';
        ds.borderColor     = WAVE_COLORS[i];
        ds.borderWidth     = 2;
      } else if (i === idx) {
        ds.backgroundColor = WAVE_COLORS[i] + 'cc';
        ds.borderColor     = WAVE_COLORS[i];
        ds.borderWidth     = 3.5;
      } else {
        ds.backgroundColor = WAVE_COLORS[i] + '18';
        ds.borderColor     = WAVE_COLORS[i] + '44';
        ds.borderWidth     = 1;
      }
    });
    c.update('none');
    wrap.querySelectorAll('[data-wave-idx]').forEach(el => {
      const i = +el.dataset.waveIdx;
      el.style.opacity    = (idx === -1 || i === idx) ? '1' : '0.3';
      el.style.fontWeight = (idx !== -1 && i === idx) ? '700' : '400';
    });
  }
  wrap.querySelectorAll('[data-wave-idx]').forEach(el => {
    el.addEventListener('mouseenter', () => applyWaveHover(+el.dataset.waveIdx));
    el.addEventListener('mouseleave', () => applyWaveHover(-1));
  });
}

    <div class="chart-subtitle">

    </div>
    <div style="position:relative;height:440px"><canvas id="vcChart"></canvas></div>
    <div style="margin-top:14px;">${legendHTML}</div>`;

  // All lines solid; colours already defined as light palette
  const datasets = allSeries.map(s => ({
    label: s.label,
    data: s.data,
    borderColor: s.color,
    backgroundColor: s.color + '14',
    borderWidth: 2,
    borderDash: [],
    pointRadius: 4,
    pointHoverRadius: 6,
    pointBackgroundColor: s.color,
    tension: 0.35,
    fill: false,
  }));

  const LEVEL = ['','Weak','Fair','Good','Strong','Best'];
  const c = new Chart(ctx, {
    type: 'line',
    data: { labels: VC_KCFS, datasets },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 10, right: 10 } },
      scales: {
        x: {
          grid: { color: 'rgba(148,163,184,0.2)' },
          ticks: { font: { size: 11 }, maxRotation: 30, color: '#94a3b8' },
        },
        y: {
          // max=6 adds one unlabelled gridline above "Best" for breathing room
          min: 1, max: 6,
          grid: { color: 'rgba(148,163,184,0.2)' },
          ticks: {
            stepSize: 1,
            font: { size: 11 },
            color: '#94a3b8',
            callback: v => LEVEL[v] ?? '',
          },
          title: { display: true, text: 'Offering Level', font: { size: 11 }, color: '#94a3b8' },
        },
      },
      plugins: {
        legend: { display: false },
        datalabels: { display: false },
        tooltip: {
          mode: 'nearest',
          intersect: false,
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${LEVEL[ctx.parsed.y] ?? ctx.parsed.y}`,
          }
        },
      },
      interaction: { mode: 'nearest', axis: 'x', intersect: false },
    }
  });
  _charts.push(c);

  // ── Hover: highlight hovered line, dim all others ─────────────────────────
  let _hovIdx = -1;
  const vcCanvas = document.getElementById('vcChart');

  function applyVcHover(idx) {
    if (idx === _hovIdx) return;
    _hovIdx = idx;
    c.data.datasets.forEach((ds, i) => {
      const hex = allSeries[i].color;
      const rv = parseInt(hex.slice(1,3), 16);
      const gv = parseInt(hex.slice(3,5), 16);
      const bv = parseInt(hex.slice(5,7), 16);
      if (idx === -1) {
        ds.borderColor = hex;
        ds.borderWidth = 2;
        ds.pointRadius = 4;
      } else if (i === idx) {
        ds.borderColor = hex;
        ds.borderWidth = 3.5;
        ds.pointRadius = 6;
      } else {
        ds.borderColor = `rgba(${rv},${gv},${bv},0.14)`;
        ds.borderWidth = 1;
        ds.pointRadius = 2;
      }
    });
    c.update('none');
    // Sync legend item opacity + weight with chart highlight state
    wrap.querySelectorAll('[data-vc-idx]').forEach(el => {
      const i = +el.dataset.vcIdx;
      el.style.opacity    = (idx === -1 || i === idx) ? '1' : '0.3';
      el.style.fontWeight = (idx !== -1 && i === idx) ? '700' : '400';
    });
  }

  vcCanvas.addEventListener('mousemove', evt => {
    const rect = vcCanvas.getBoundingClientRect();
    const mx = evt.clientX - rect.left;
    const my = evt.clientY - rect.top;
    const ca = c.chartArea;
    if (!ca || mx < ca.left || mx > ca.right || my < ca.top || my > ca.bottom) {
      applyVcHover(-1); return;
    }
    // Find nearest x-column (category tick)
    const xs = c.scales.x;
    let nearCol = 0, minDx = Infinity;
    VC_KCFS.forEach((_, i) => {
      const d = Math.abs(mx - xs.getPixelForValue(i));
      if (d < minDx) { minDx = d; nearCol = i; }
    });
    // Find dataset whose y at that column is nearest to the mouse
    const ys = c.scales.y;
    let nearDs = -1, minDy = Infinity;
    c.data.datasets.forEach((ds, i) => {
      const d = Math.abs(my - ys.getPixelForValue(ds.data[nearCol]));
      if (d < minDy) { minDy = d; nearDs = i; }
    });
    applyVcHover(minDy < 40 ? nearDs : -1);
  });
  vcCanvas.addEventListener('mouseleave', () => applyVcHover(-1));

  // ── VC legend hover ────────────────────────────────────────────────────────
  wrap.querySelectorAll('[data-vc-idx]').forEach(el => {
    el.addEventListener('mouseenter', () => applyVcHover(+el.dataset.vcIdx));
    el.addEventListener('mouseleave', () => applyVcHover(-1));
  });
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function findNextTable(el) {
  let n = el.nextElementSibling;
  while (n && n.tagName !== 'TABLE' && !['H2','H1'].includes(n.tagName)) {
    if (n.tagName === 'TABLE') return n;
    if (n.querySelector('table')) return n.querySelector('table');
    n = n.nextElementSibling;
  }
  return n && n.tagName === 'TABLE' ? n : null;
}

function injectCharts() {
  destroyCharts();
  const anchors = _chartCfg.anchors;
  document.querySelectorAll('#content h3').forEach(h3 => {
    const t = h3.textContent.trim();
    if      (anchors.mq.some(k => t.includes(k)))   inject2x2(h3);
    else if (anchors.wave.some(k => t.includes(k))) injectWave(h3);
    else if (anchors.vc.some(k => t.includes(k)))   injectValueCurve(h3);
  });
}

// ─── Main load ───────────────────────────────────────────────────────────────
async function loadFile(path) {
  destroyCharts();
  document.getElementById('content').innerHTML = '<p style="color:var(--color-text-muted);padding:40px 0;">Loading…</p>';
  document.getElementById('toc').innerHTML = '';
  try {
    const r = await fetch('/' + path);
    const md = await r.text();
    document.getElementById('content').innerHTML = DOMPurify.sanitize(marked.parse(md), {USE_PROFILES: {html: true}});
    buildTOC();
    document.getElementById('stats').textContent =
      `${(md.length/1000).toFixed(1)}K chars · ${md.split('\n').length} lines`;
    window.scrollTo(0, 0);
    // Update browser tab title from report H1
    const h1 = document.querySelector('#content h1');
    if (h1) document.title = h1.textContent.trim() + ' — MultAI Report Viewer';
    // Reset chart data and config to defaults before applying report-specific overrides
    MQ_DATA       = _DEFAULT_MQ_DATA;
    MQ_COLORS     = { ..._DEFAULT_MQ_COLORS };
    GMQ_DATA      = _DEFAULT_GMQ_DATA;
    GMQ_COLORS    = { ..._DEFAULT_GMQ_COLORS };
    WAVE_DATA     = _DEFAULT_WAVE_DATA;
    VC_KCFS       = _DEFAULT_VC_KCFS;
    VC_COMMERCIAL = _DEFAULT_VC_COMMERCIAL;
    VC_OSS        = _DEFAULT_VC_OSS;
    LINK_PAIRS    = _DEFAULT_LINK_PAIRS;
    _chartCfg     = JSON.parse(JSON.stringify(_DEFAULT_CHART_CFG));
    // Try to load report-specific chart-data.json (generated alongside each report)
    if (path.includes('Market Landscape Report') || path.includes('Consolidated Intelligence Report')) {
      const reportDir = path.split('/')[0];
      try {
        const cdResp = await fetch('/' + reportDir + '/chart-data.json');
        if (cdResp.ok) {
          const cd = await cdResp.json();
          if (cd.mq_data)       MQ_DATA       = cd.mq_data;
          if (cd.mq_colors)     MQ_COLORS     = cd.mq_colors;
          if (cd.gmq_data)      GMQ_DATA      = cd.gmq_data;
          if (cd.gmq_colors)    GMQ_COLORS    = cd.gmq_colors;
          if (cd.wave_data)     WAVE_DATA     = cd.wave_data;
          if (cd.vc_kcfs)       VC_KCFS       = cd.vc_kcfs;
          if (cd.vc_commercial) VC_COMMERCIAL = cd.vc_commercial;
          if (cd.vc_oss)        VC_OSS        = cd.vc_oss;
          if (cd.link_pairs)    LINK_PAIRS    = cd.link_pairs;
          if (cd.anchors)       _chartCfg.anchors = cd.anchors;
          if (cd.titles)        _chartCfg.titles  = cd.titles;
        }
      } catch (_) { /* chart-data.json absent — using defaults */ }
    }
    // Show/hide vendor nav rows based on content type
    const isReport = path.includes('Report') || path.includes('report');
    const commRow = document.getElementById('snavCommercial');
    const ossRow  = document.getElementById('snavOSS');
    if (commRow) commRow.style.display = isReport ? 'flex' : 'none';
    if (ossRow)  ossRow.style.display  = isReport ? 'flex' : 'none';
    // Inject charts (consolidated report only), then linkify all files
    if (path.includes('Consolidated Intelligence Report') || path.includes('Market Landscape Report')) {
      setTimeout(() => {
        injectCharts();
        linkify();
        setTimeout(() => postRender(), 0);
      }, 0);
    } else {
      setTimeout(() => { linkify(); setTimeout(() => postRender(), 0); }, 0);
    }
  } catch(e) {
    const errPre = document.createElement('pre');
    errPre.style.color = 'var(--color-error)';
    errPre.textContent = String(e);
    const contentEl = document.getElementById('content');
    contentEl.innerHTML = '';
    contentEl.appendChild(errPre);
  }
}

function buildTOC() {
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  document.querySelectorAll('#content h1, #content h2, #content h3').forEach((h, i) => {
    const id = 'h-' + i; h.id = id;
    const li = document.createElement('li');
    const a  = document.createElement('a');
    a.href = '#' + id;
    a.textContent = (h.tagName==='H1' ? '● ' : h.tagName==='H2' ? '  ○ ' : '    · ') + h.textContent;
    a.style.fontSize = h.tagName==='H1' ? '13px' : h.tagName==='H2' ? '12px' : '11px';
    a.onclick = () => { document.querySelectorAll('#sidebar a').forEach(x=>x.classList.remove('active')); a.classList.add('active'); };
    li.appendChild(a); toc.appendChild(li);
  });
}

// ─── #6 Progress bar + scroll polling fallback ──────────────────────────────
let _progressBar = null;
let _lastScrollY = -1;
function _onScrollTick() {
  const y = document.documentElement.scrollTop;
  if (y === _lastScrollY) return;
  _lastScrollY = y;
  // Update progress bar
  if (_progressBar) {
    const s = document.documentElement;
    const pct = s.scrollHeight - s.clientHeight > 0
      ? (s.scrollTop / (s.scrollHeight - s.clientHeight)) * 100 : 0;
    _progressBar.style.width = pct + '%';
  }
  // Dispatch custom event for breadcrumb (so the IIFE module can listen)
  window.dispatchEvent(new CustomEvent('scrolltick'));
}
// Primary: native scroll events
window.addEventListener('scroll', _onScrollTick, { passive: true });
// Fallback: polling at 200ms for environments where scroll events don't fire
setInterval(_onScrollTick, 200);

document.addEventListener('DOMContentLoaded', () => {
  _progressBar = document.getElementById('readProgressBar');
  document.getElementById('compareBtn').addEventListener('click', () => {
    document.getElementById('compareDrawer').classList.toggle('open');
  });
  const closeBtn = document.getElementById('compareCloseBtn');
  if (closeBtn) closeBtn.addEventListener('click', () => {
    document.getElementById('compareDrawer').classList.remove('open');
  });
  document.getElementById('copyGdocsBtn').addEventListener('click', copyForGoogleDocs);
  document.getElementById('pdfExportBtn').addEventListener('click', exportToPDF);
});

// ─── Copy for Google Docs ──────────────────────────────────────────────────
async function copyForGoogleDocs() {
  const btn = document.getElementById('copyGdocsBtn');
  const origHTML = btn.innerHTML;
  btn.innerHTML = '<span class="btn-icon">⏳</span> Preparing…';
  btn.disabled = true;

  try {
    // 1. Expand all collapsed vendor cards temporarily
    const collapsedBodies = document.querySelectorAll('.vc-body.vc-collapsed');
    collapsedBodies.forEach(b => b.classList.remove('vc-collapsed'));

    // 2. Clone the content
    const content = document.getElementById('content');
    const clone = content.cloneNode(true);

    // 3. Convert all canvas elements to inline images
    const origCanvases = content.querySelectorAll('canvas');
    const cloneCanvases = clone.querySelectorAll('canvas');
    origCanvases.forEach((origCanvas, i) => {
      try {
        const dataUrl = origCanvas.toDataURL('image/png');
        const img = document.createElement('img');
        img.src = dataUrl;
        img.style.cssText = 'max-width:100%;height:auto;';
        img.alt = 'Chart';
        if (cloneCanvases[i]) {
          cloneCanvases[i].parentNode.replaceChild(img, cloneCanvases[i]);
        }
      } catch(e) { /* canvas tainted — skip */ }
    });

    // 4. Remove UI-only elements from clone
    clone.querySelectorAll('#vendorFilterBar, .vc-toggle, .vname-link').forEach(el => {
      if (el.classList.contains('vname-link')) {
        // Replace vname-link spans with plain text
        el.replaceWith(document.createTextNode(el.textContent));
      } else {
        el.remove();
      }
    });

    // 5. Make vendor cards look expanded in the copy
    clone.querySelectorAll('.vc-body').forEach(b => {
      b.style.display = 'block';
      b.classList.remove('vc-collapsed');
    });

    // 6. Un-hide the original H3 inside vendor cards and style them
    clone.querySelectorAll('.vendor-card > h3').forEach(h3 => {
      h3.style.display = 'block';
      h3.style.cssText = 'font-size:16pt;color:#4f46e5;margin:12px 0 8px;font-weight:bold;';
    });
    // Remove the vc-header since h3 is now visible
    clone.querySelectorAll('.vc-header').forEach(h => h.remove());
    // Remove vc-tags (not needed in doc)
    clone.querySelectorAll('.vc-tags').forEach(t => t.remove());

    // 7. Apply inline styles for Google Docs compatibility
    _inlineStylesForGDocs(clone);

    // 8. Build final HTML with wrapper styles
    const html = `<div style="font-family:Arial,Helvetica,sans-serif;font-size:11pt;color:#1a1a1a;line-height:1.6;max-width:800px;">${clone.innerHTML}</div>`;

    // 9. Copy to clipboard as rich HTML
    const blob = new Blob([html], { type: 'text/html' });
    await navigator.clipboard.write([
      new ClipboardItem({ 'text/html': blob })
    ]);

    // 10. Re-collapse the vendor cards
    collapsedBodies.forEach(b => b.classList.add('vc-collapsed'));

    btn.innerHTML = '<span class="btn-icon">✅</span> Copied!';
    setTimeout(() => { btn.innerHTML = origHTML; btn.disabled = false; }, 2500);

  } catch(e) {
    console.error('Copy failed:', e);
    // Re-collapse
    document.querySelectorAll('.vc-body.vc-collapsed').forEach(b => b.classList.add('vc-collapsed'));
    btn.innerHTML = '<span class="btn-icon">❌</span> Failed';
    setTimeout(() => { btn.innerHTML = origHTML; btn.disabled = false; }, 2500);
  }
}

function _inlineStylesForGDocs(root) {
  // Headings
  root.querySelectorAll('h1').forEach(el => {
    el.style.cssText = 'font-size:22pt;color:#4f46e5;font-weight:bold;border-bottom:2px solid #e2e8f0;padding-bottom:8px;margin:20px 0 12px;';
  });
  root.querySelectorAll('h2').forEach(el => {
    el.style.cssText = 'font-size:16pt;color:#4f46e5;font-weight:bold;border-bottom:1px solid #e2e8f0;padding-bottom:6px;margin:24px 0 10px;';
  });
  root.querySelectorAll('h3').forEach(el => {
    if (!el.style.cssText) el.style.cssText = 'font-size:13pt;color:#7c3aed;font-weight:bold;margin:16px 0 6px;';
  });
  root.querySelectorAll('h4').forEach(el => {
    el.style.cssText = 'font-size:11pt;color:#7c3aed;font-weight:bold;margin:12px 0 4px;';
  });

  // Paragraphs
  root.querySelectorAll('p').forEach(el => {
    el.style.cssText += ';font-size:11pt;margin:0 0 8px;line-height:1.6;';
  });

  // Lists
  root.querySelectorAll('ul,ol').forEach(el => {
    el.style.cssText = 'margin:0 0 10px 24px;font-size:11pt;';
  });
  root.querySelectorAll('li').forEach(el => {
    el.style.cssText = 'margin:3px 0;line-height:1.5;';
  });

  // Bold & italic
  root.querySelectorAll('strong').forEach(el => { el.style.fontWeight = '700'; });

  // Links — make them brand-colored
  root.querySelectorAll('a').forEach(el => {
    el.style.cssText = 'color:#4f46e5;text-decoration:underline;';
  });

  // Blockquotes / callouts
  root.querySelectorAll('blockquote, .callout').forEach(el => {
    el.style.cssText = 'border-left:4px solid #4f46e5;padding:8px 14px;margin:12px 0;background:rgba(79,70,229,0.06);font-size:11pt;';
  });

  // HR
  root.querySelectorAll('hr').forEach(el => {
    el.style.cssText = 'border:none;border-top:1px solid #e2e8f0;margin:20px 0;';
  });

  // Code
  root.querySelectorAll('code').forEach(el => {
    el.style.cssText = 'background:rgba(79,70,229,0.07);padding:1px 4px;border-radius:3px;font-family:Consolas,monospace;font-size:10pt;color:#6366f1;';
  });
  root.querySelectorAll('pre').forEach(el => {
    el.style.cssText = 'background:#f8f9fc;padding:12px;border-radius:6px;overflow-x:auto;margin:10px 0;font-size:10pt;font-family:Consolas,monospace;border:1px solid #e2e8f0;';
  });
  root.querySelectorAll('pre code').forEach(el => {
    el.style.cssText = 'background:none;padding:0;font-family:Consolas,monospace;font-size:10pt;color:inherit;';
  });

  // Tables — Google Docs needs inline borders on every cell
  root.querySelectorAll('table').forEach(tbl => {
    tbl.style.cssText = 'width:100%;border-collapse:collapse;margin:12px 0;font-size:10pt;';
    tbl.querySelectorAll('th').forEach(th => {
      th.style.cssText = 'background:rgba(79,70,229,0.06);color:#0f172a;font-weight:bold;font-size:9pt;text-transform:uppercase;letter-spacing:0.3px;padding:8px 10px;border:1px solid #e2e8f0;text-align:left;';
    });
    tbl.querySelectorAll('td').forEach(td => {
      td.style.cssText = 'padding:7px 10px;border:1px solid #e2e8f0;vertical-align:top;font-size:10pt;';
    });
    // Zebra striping
    tbl.querySelectorAll('tbody tr').forEach((tr, i) => {
      if (i % 2 === 1) tr.style.background = 'rgba(79,70,229,0.02)';
    });
  });

  // Pros/cons grid → convert to a simple 2-column table for GDocs (CSS grid won't work)
  root.querySelectorAll('.pros-cons-grid').forEach(grid => {
    const prosCol = grid.querySelector('.pros-col');
    const consCol = grid.querySelector('.cons-col');
    if (!prosCol || !consCol) return;
    const tbl = document.createElement('table');
    tbl.style.cssText = 'width:100%;border-collapse:collapse;margin:10px 0;';
    tbl.innerHTML = `<tr>
      <td style="vertical-align:top;width:50%;padding:8px 12px;border:1px solid #e2e8f0;">${prosCol.innerHTML}</td>
      <td style="vertical-align:top;width:50%;padding:8px 12px;border:1px solid #e2e8f0;">${consCol.innerHTML}</td>
    </tr>`;
    grid.replaceWith(tbl);
  });

  // Chart frames — remove animation classes, keep clean
  root.querySelectorAll('.chart-frame').forEach(el => {
    el.style.cssText = 'border:1px solid #e2e8f0;border-radius:8px;padding:16px 20px;margin:16px 0;background:#ffffff;';
  });
  root.querySelectorAll('.chart-title').forEach(el => {
    el.style.cssText = 'font-size:10pt;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;color:#94a3b8;margin-bottom:4px;';
  });
  root.querySelectorAll('.chart-subtitle').forEach(el => {
    el.style.cssText = 'font-size:9pt;color:#94a3b8;margin-bottom:14px;';
  });

  // Trend cards → convert to a simple list for GDocs
  root.querySelectorAll('.trend-strip').forEach(strip => {
    const cards = strip.querySelectorAll('.trend-card');
    if (cards.length === 0) return;
    const tbl = document.createElement('table');
    tbl.style.cssText = 'width:100%;border-collapse:collapse;margin:12px 0;';
    let rowHTML = '<tr>';
    cards.forEach((card, i) => {
      const icon = card.querySelector('.tc-icon')?.textContent || '';
      const title = card.querySelector('.tc-title')?.textContent || '';
      const body = card.querySelector('.tc-body')?.textContent || '';
      rowHTML += `<td style="vertical-align:top;padding:10px;border:1px solid #e2e8f0;width:${Math.floor(100/Math.min(cards.length,4))}%;background:#f8f9fc;">
        <div style="font-size:16pt;margin-bottom:4px;">${icon}</div>
        <div style="font-size:10pt;font-weight:bold;color:#0f172a;margin-bottom:4px;">${title}</div>
        <div style="font-size:9pt;color:#475569;line-height:1.4;">${body}</div>
      </td>`;
      // Max 4 per row
      if ((i + 1) % 4 === 0 && i < cards.length - 1) rowHTML += '</tr><tr>';
    });
    rowHTML += '</tr>';
    tbl.innerHTML = rowHTML;
    strip.replaceWith(tbl);
  });

  // Vendor card wrapper — clean border
  root.querySelectorAll('.vendor-card').forEach(el => {
    el.style.cssText = 'border:1px solid #e2e8f0;border-radius:8px;padding:12px 16px;margin:14px 0;page-break-inside:avoid;';
  });

  // Remove elements that don't belong in the doc
  root.querySelectorAll('.collapsible::before, .wave-legend i, .vc-legend i').forEach(el => el.remove());

  // Collapsible indicators — remove ▾/▸ characters from H3 text
  root.querySelectorAll('h3.collapsible').forEach(h3 => {
    h3.textContent = h3.textContent.replace(/^[▸▾]\s*/, '');
  });

  // Section color coding — apply left border inline
  const SEC_COLORS = ['#4f46e5','#059669','#db2777','#7c3aed','#d97706','#6366f1','#a855f7','#ec4899'];
  root.querySelectorAll('h2').forEach((h2, i) => {
    const c = SEC_COLORS[i % 8];
    h2.style.borderLeft = '4px solid ' + c;
    h2.style.paddingLeft = '10px';
  });
}
