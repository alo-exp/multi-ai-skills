  }
  window.postRender = postRender;

  // ── #0 removeExtraneousHRs ───────────────────────────────────────────────────
  function removeExtraneousHRs() {
    const hrs = [...document.querySelectorAll('#content hr')];
    // Keep only the last <hr> in content (footer separator before "End of Report")
    const footerHR = hrs.length > 0 ? hrs[hrs.length - 1] : null;
    hrs.forEach(hr => {
      if (hr !== footerHR) hr.remove();
    });
  }

  // ── #4 transformCallouts ─────────────────────────────────────────────────────
  function transformCallouts() {
    document.querySelectorAll('#content blockquote').forEach(bq => {
      const strong = bq.querySelector('strong');
      const typeText = strong ? strong.textContent.toLowerCase().trim() : '';
      let type = 'default';
      if (typeText.startsWith('key insight'))    type = 'insight';
      else if (typeText.startsWith('market signal')) type = 'signal';
      else if (typeText.startsWith('risk'))       type = 'risk';
      else if (typeText.startsWith('stat'))       type = 'stat';
      const div = document.createElement('div');
      div.className = 'callout callout-' + type;
      div.innerHTML = bq.innerHTML;
      bq.parentNode.replaceChild(div, bq);
    });
  }

  // ── #5 buildTrendCards ───────────────────────────────────────────────────────
  function buildTrendCards() {
    const trendH2 = Array.from(document.querySelectorAll('#content h2'))
      .find(h => /trend/i.test(h.textContent));
    if (!trendH2) return;

    const strip = document.createElement('div');
    strip.className = 'trend-strip';
    strip.setAttribute('role', 'list');

    // Collect all nodes between this H2 and next H2 — to replace them later
    const nodesToReplace = [];
    let sib = trendH2.nextElementSibling;

    // Strategy: collect H3 headings as trend titles + following body paragraphs
    // Falls back to OL/UL list items if no H3s are found
    const trendItems = [];  // { title, body }
    let currentTitle = null, currentBodyParts = [];

    while (sib && sib.tagName !== 'H2') {
      nodesToReplace.push(sib);
      if (sib.tagName === 'H3') {
        // Save previous trend
        if (currentTitle !== null) {
          trendItems.push({ title: currentTitle, body: currentBodyParts.join(' ').trim() });
        }
        // Strip "Trend N: " prefix if present
        currentTitle = sib.textContent.trim().replace(/^Trend\s+\d+:\s*/i, '');
        currentBodyParts = [];
      } else if (currentTitle !== null && ['P','UL','OL'].includes(sib.tagName)) {
        currentBodyParts.push(sib.textContent.trim());
      } else if (sib.tagName === 'LI') {
        // Fallback: plain list
        const strong = sib.querySelector('strong');
        if (strong) {
          if (currentTitle !== null) trendItems.push({ title: currentTitle, body: currentBodyParts.join(' ').trim() });
          currentTitle = strong.textContent.trim();
          currentBodyParts = [sib.textContent.replace(strong.textContent, '').replace(/^[:\s–—]+/, '').trim()];
        }
      }
      sib = sib.nextElementSibling;
    }
    if (currentTitle !== null) {
      trendItems.push({ title: currentTitle, body: currentBodyParts.join(' ').trim() });
    }

    // Fallback: try OL/UL directly after H2 if no H3-based items found
    if (trendItems.length === 0) {
      const list = nodesToReplace.find(n => ['OL','UL'].includes(n.tagName));
      if (list) {
        list.querySelectorAll(':scope > li').forEach(li => {
          const strong = li.querySelector('strong');
          if (strong) {
            const clone = li.cloneNode(true);
            clone.querySelectorAll('strong').forEach(s => s.remove());
            trendItems.push({ title: strong.textContent.trim(), body: clone.textContent.replace(/^[:\s–—]+/, '').trim() });
          } else {
            const text = li.textContent.trim();
            const ci = text.indexOf(':');
            trendItems.push(ci > 0
              ? { title: text.slice(0, ci).trim(), body: text.slice(ci + 1).trim() }
              : { title: text.slice(0, 60).trim(), body: text.slice(60).trim() });
          }
        });
      }
    }

    if (trendItems.length === 0) return;

    trendItems.forEach(({ title, body }, idx) => {
      const card = document.createElement('div');
      card.className = 'trend-card';
      card.setAttribute('role', 'listitem');
      // Truncate body to ~120 chars for card readability
      const shortBody = body.length > 130 ? body.slice(0, 127) + '…' : body;
      card.innerHTML =
        `<div class="tc-icon">${TREND_ICONS[idx % TREND_ICONS.length]}</div>` +
        `<div class="tc-title">${title}</div>` +
        `<div class="tc-body">${shortBody}</div>`;
      strip.appendChild(card);
    });

    // Replace all collected nodes with the strip
    const parent = trendH2.parentNode;
    nodesToReplace.forEach(n => n.remove());
    trendH2.after(strip);
  }

  // ── #11 buildInfoCards — Shortlist Profiles & Future Outlook ─────────────────
  function buildInfoCards() {
    const SECTION_PATTERNS = [
      /Buying Guidance|Shortlist/i,
      /Future Outlook|Emerging Disrupt/i
    ];
    SECTION_PATTERNS.forEach(pattern => {
      const h2 = Array.from(document.querySelectorAll('#content h2')).find(h => pattern.test(h.textContent));
      if (!h2) return;

      // Collect H3s and their body nodes between this H2 and next H2
      const items = [];
      let sib = h2.nextElementSibling;
      let currentH3 = null;
      let currentNodes = [];

      while (sib && sib.tagName !== 'H2') {
        if (sib.tagName === 'H3') {
          if (currentH3) items.push({ h3: currentH3, nodes: currentNodes });
          currentH3 = sib;
          currentNodes = [];
        } else if (currentH3) {
          currentNodes.push(sib);
        }
        sib = sib.nextElementSibling;
      }
      if (currentH3) items.push({ h3: currentH3, nodes: currentNodes });
      if (items.length === 0) return;

      // Build cards in a container, replace existing H3+content
      const container = document.createDocumentFragment();
      items.forEach(({ h3, nodes }) => {
        // Strip leading "N. " from title
        const title = h3.textContent.trim().replace(/^\d+\.\s*/, '');

        const card = document.createElement('div');
        card.className = 'info-card';

        const hdr = document.createElement('div');
        hdr.className = 'info-card-header';
        hdr.innerHTML = `<span style="flex:1">${title}</span><span class="info-card-toggle">▾</span>`;

        const body = document.createElement('div');
        body.className = 'info-card-body'; // collapsed by default
        // Remove any trailing HRs
        const cleanNodes = nodes.filter(n => n.tagName !== 'HR');
        cleanNodes.forEach(n => body.appendChild(n));

        hdr.addEventListener('click', () => {
          const isOpen = body.classList.toggle('open');
          hdr.querySelector('.info-card-toggle').textContent = isOpen ? '▴' : '▾';
        });

        card.appendChild(hdr);
        card.appendChild(body);
        container.appendChild(card);

        h3.remove();
      });

      // Insert container where first H3 was (after H2)
      h2.after(container);

      // Remove any stray <hr> elements directly under this section
      let el = h2.nextElementSibling;
      const nextH2 = h2.nextElementSibling ? (function findNext(node){
        while (node) { if (node.tagName === 'H2') return node; node = node.nextElementSibling; }
        return null;
      })(h2.nextElementSibling) : null;
      let scan = h2.nextElementSibling;
      while (scan && scan !== nextH2) {
        const nxt = scan.nextElementSibling;
        if (scan.tagName === 'HR') scan.remove();
        scan = nxt;
      }
    });
  }

  // ── #10 applySectionColors ───────────────────────────────────────────────────
  function applySectionColors() {
    document.querySelectorAll('#content h2').forEach((h2, idx) => {
      const cls = 'sec-color-' + (idx % 8);
      h2.classList.add(cls);
      const h2Text = h2.textContent.trim();
      const tocLink = Array.from(document.querySelectorAll('#toc a'))
        .find(a => a.textContent.trim().replace(/^[●○·\s]+/, '') === h2Text);
      if (tocLink) tocLink.classList.add(cls);
    });
  }

  // ── #3 buildVendorCards ──────────────────────────────────────────────────────
  function buildVendorCards() {
    let vendorIdx = 0;
    document.querySelectorAll('#content h2').forEach(h2 => {
      if (!/Commercial|Open[\s\-]Source|OSS/i.test(h2.textContent)) return;

      const vendorH3s = [];
      let sib = h2.nextElementSibling;
      while (sib && sib.tagName !== 'H2') {
        if (sib.tagName === 'H3') vendorH3s.push(sib);
        sib = sib.nextElementSibling;
      }

      vendorH3s.forEach(h3 => {
        const rawName = h3.textContent.replace(/^[▸▾]\s*/, '').trim();
        // Strip leading "N. " and trailing "(type info)" for display
        const displayName = rawName.replace(/^\d+\.\s*/, '').replace(/\s*\(.*\)\s*$/, '').trim();
        const color = AVATAR_COLORS[vendorIdx % AVATAR_COLORS.length];
        const initial = displayName.charAt(0).toUpperCase();
        vendorIdx++;

        const contentNodes = [];
        let n = h3.nextSibling;
        while (n) {
          if (n.tagName === 'H2' || n.tagName === 'H3') break;
          contentNodes.push(n);
          n = n.nextSibling;
        }

        // Tags: from <strong> in FIRST <p>, max 4, max 25 chars
        // Filter out structural labels
        const STRUCTURAL_LABELS = new Set(['overview', 'major pros', 'major cons', 'key differentiator', 'best for', 'pricing']);
        const firstP = contentNodes.find(nd => nd.tagName === 'P');
        const tags = [];
        if (firstP) {
          firstP.querySelectorAll('strong').forEach(s => {
            const txt = s.textContent.trim();
            const stripped = txt.toLowerCase().replace(/[:\s]+$/, '');
            if (txt && txt.length <= 25 && tags.length < 4 && !STRUCTURAL_LABELS.has(stripped)) tags.push(txt);
          });
        }

        const card = document.createElement('div');
        card.className = 'vendor-card';
        card.dataset.vendor = rawName;

        const header = document.createElement('div');
        header.className = 'vc-header';
        header.innerHTML =
          `<div class="vc-avatar" style="background:${color}">${initial}</div>` +
          `<div class="vc-name">${displayName}</div>` +
          `<span class="vc-toggle is-closed">▾</span>`;

        const tagsDiv = document.createElement('div');
        tagsDiv.className = 'vc-tags';
        tags.forEach(t => {
          const pill = document.createElement('span');
          pill.className = 'vc-tag';
          pill.textContent = t;
          tagsDiv.appendChild(pill);
        });

        const body = document.createElement('div');
        body.className = 'vc-body vc-collapsed';
        contentNodes.forEach(nd => { if (nd.tagName !== 'HR') body.appendChild(nd); });

        card.appendChild(header);
        if (tags.length > 0) card.appendChild(tagsDiv);
        card.appendChild(body);

        header.addEventListener('click', () => {
          const isCollapsed = body.classList.toggle('vc-collapsed');
          const toggle = header.querySelector('.vc-toggle');
          if (isCollapsed) {
            toggle.textContent = '▾';
            toggle.classList.remove('is-open');
            toggle.classList.add('is-closed');
          } else {
            toggle.textContent = '▴';
            toggle.classList.remove('is-closed');
            toggle.classList.add('is-open');
          }
        });

        if (h3.parentNode) {
          h3.parentNode.insertBefore(card, h3);
          card.insertBefore(h3, card.firstChild);
          h3.style.display = 'none';
        }
      });
    });
  }

  // ── #7b layoutProsCons ──────────────────────────────────────────────────────
  function layoutProsCons() {
    document.querySelectorAll('.vc-body').forEach(body => {
      // Find "Major Pros" and "Major Cons" sections
      const allEls = Array.from(body.children);
      let prosLabel = null, prosList = null, consLabel = null, consList = null;

      for (let i = 0; i < allEls.length; i++) {
        const el = allEls[i];
        const text = el.textContent || '';
        if (/Major Pros/i.test(text)) {
          prosLabel = el;
          // Find the next UL
          for (let j = i + 1; j < allEls.length; j++) {
            if (allEls[j].tagName === 'UL') { prosList = allEls[j]; break; }
            if (allEls[j].tagName === 'H2' || allEls[j].tagName === 'H3') break;
          }
        }
        if (/Major Cons/i.test(text)) {
          consLabel = el;
          for (let j = i + 1; j < allEls.length; j++) {
            if (allEls[j].tagName === 'UL') { consList = allEls[j]; break; }
            if (allEls[j].tagName === 'H2' || allEls[j].tagName === 'H3') break;
          }
        }
      }

      if (prosLabel && prosList && consLabel && consList) {
        const grid = document.createElement('div');
        grid.className = 'pros-cons-grid';

        const prosCol = document.createElement('div');
        prosCol.className = 'pros-col';
        prosCol.appendChild(prosLabel);
        prosCol.appendChild(prosList);

        const consCol = document.createElement('div');
        consCol.className = 'cons-col';
        consCol.appendChild(consLabel);
        consCol.appendChild(consList);

        grid.appendChild(prosCol);
        grid.appendChild(consCol);

        // Insert grid where prosLabel was
        const remaining = Array.from(body.children);
        let insertBefore = null;
        for (const el of remaining) {
          const t = el.textContent || '';
          if (/Key Differentiator|Best For|Pricing/i.test(t)) { insertBefore = el; break; }
        }
        if (insertBefore) {
          body.insertBefore(grid, insertBefore);
        } else {
          body.appendChild(grid);
        }
      }
    });
  }

  // ── #9 setupCollapsibles ─────────────────────────────────────────────────────
  function setupCollapsibles() {
    document.querySelectorAll('#content h3').forEach(h3 => {
      if (/(3A|3B|3C|Primary 2.2|Wave|Value Curve)/i.test(h3.textContent)) return;
      if (h3.classList.contains('collapsible')) return; // already processed
      if (h3.closest('.vendor-card')) return; // skip H3s inside vendor cards

      const bodyNodes = [];
      let sib = h3.nextSibling;
      while (sib) {
        if (sib.tagName === 'H2' || sib.tagName === 'H3') break;
        bodyNodes.push(sib);
        sib = sib.nextSibling;
      }
      if (bodyNodes.length === 0) return;

      const bodyDiv = document.createElement('div');
      bodyDiv.className = 'collapsible-body';
      if (h3.parentNode) h3.parentNode.insertBefore(bodyDiv, bodyNodes[0]);
      bodyNodes.forEach(nd => bodyDiv.appendChild(nd));
      bodyDiv.style.maxHeight = bodyDiv.scrollHeight + 'px';

      h3.classList.add('collapsible');
      h3.setAttribute('role', 'button');
      h3.setAttribute('tabindex', '0');
      h3.setAttribute('aria-expanded', 'true');

      function toggleCollapsible() {
        const isOpen = h3.getAttribute('aria-expanded') === 'true';
        if (isOpen) {
          bodyDiv.style.maxHeight = '0';
          h3.classList.add('is-closed');
          h3.setAttribute('aria-expanded', 'false');
        } else {
          bodyDiv.style.maxHeight = bodyDiv.scrollHeight + 'px';
          h3.classList.remove('is-closed');
          h3.setAttribute('aria-expanded', 'true');
        }
      }

      h3.addEventListener('click', toggleCollapsible);
      h3.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleCollapsible(); }
      });
    });
  }

  // ── NEW buildSolutionNav ─────────────────────────────────────────────────────
  function buildSolutionNav() {
    const navEl = document.getElementById('solutionNav');
    if (!navEl) return;

    const commRow = document.getElementById('snavCommercial');
    const ossRow  = document.getElementById('snavOSS');
    if (!commRow || !ossRow) return;

    // Remove existing buttons (keep label span)
    commRow.querySelectorAll('.snav-btn').forEach(b => b.remove());
    ossRow.querySelectorAll('.snav-btn').forEach(b => b.remove());

    // Collect vendor names from DOM sections
    function collectVendorNames(sectionTest) {
      const names = [];
      for (const h2 of document.querySelectorAll('#content h2')) {
        if (sectionTest(h2.textContent)) {
          let sib = h2.nextElementSibling;
          while (sib && sib.tagName !== 'H2') {
            if (sib.tagName === 'H3') {
              const text = sib.textContent.replace(/^[▸▾]\s*/, '').trim();
              // Skip tier/group headings — they are section dividers, not vendor names
              if (!/^Tier\s+\d|^Group\s+\d/i.test(text)) names.push(text);
            }
            sib = sib.nextElementSibling;
          }
          // Fallback: if no vendor H3s found, extract names from table rows (column index 1 = name)
          if (names.length === 0) {
            sib = h2.nextElementSibling;
            while (sib && sib.tagName !== 'H2') {
              if (sib.tagName === 'TABLE') {
                sib.querySelectorAll('tbody tr').forEach(tr => {
                  const cells = tr.querySelectorAll('td');
                  if (cells.length > 1) {
                    const name = cells[1].textContent.replace(/^\*+|\*+$/g, '').trim();
                    if (name && !/^Tier\s+\d|^Group\s+\d/i.test(name)) names.push(name);
                  }
                });
              }
              sib = sib.nextElementSibling;
            }
          }
          break;
        }
      }
      return names;
    }

    const commVendorsRaw = collectVendorNames(t => /commercial/i.test(t));
    const ossVendorsRaw  = collectVendorNames(t => /open[\s\-]source|oss/i.test(t));
    // Strip leading "N. " and trailing parenthetical "(type info)"
    function stripNavName(n) { return n.replace(/^\d+\.\s*/, '').replace(/\s*\(.*\)\s*$/, '').trim(); }
    const commVendors = commVendorsRaw.map(stripNavName);
    const ossVendors  = ossVendorsRaw.map(stripNavName);

    function addPills(row, displayNames, rawNames) {
      displayNames.forEach((name, i) => {
        const raw = rawNames[i];
        const btn = document.createElement('button');
        btn.className = 'snav-btn';
        btn.textContent = name;
        btn.dataset.vendor = raw;
        btn.addEventListener('click', () => {
          const card = document.querySelector(`.vendor-card[data-vendor="${CSS.escape(raw)}"]`);
          const navH = navEl.offsetHeight;
          const bcH  = document.getElementById('breadcrumb')?.offsetHeight || 0;
          if (card) {
            const top = card.getBoundingClientRect().top + window.scrollY - navH - bcH - 12;
            window.scrollTo({ top, behavior: 'smooth' });
          } else {
            // Fallback for table-based reports: find vendor name in a <td> and scroll to that row
            const content = document.getElementById('content');
            if (!content) return;
            const lcName = name.toLowerCase();
            for (const td of content.querySelectorAll('td')) {
              if (td.textContent.replace(/^\*+|\*+$/g, '').trim().toLowerCase() === lcName) {
                const tr = td.closest('tr');
                if (tr) {
                  const top = tr.getBoundingClientRect().top + window.scrollY - navH - bcH - 12;
                  window.scrollTo({ top, behavior: 'smooth' });
                }
                break;
              }
            }
          }
        });
        row.appendChild(btn);
      });
    }

    addPills(commRow, commVendors, commVendorsRaw);
    addPills(ossRow,  ossVendors, ossVendorsRaw);

    // Adjust positions dynamically based on actual nav height
    const main = document.getElementById('main');
    if (main) {
      requestAnimationFrame(() => {
        const h = navEl.offsetHeight;
        // Position breadcrumb and progress bar relative to actual nav height
        const bc = document.getElementById('breadcrumb');
        const rp = document.getElementById('readProgress');
        if (bc) bc.style.top = h + 'px';
        if (rp) rp.style.top = (h - 1) + 'px';
        main.style.paddingTop = (h + 40) + 'px'; // nav + breadcrumb + breathing room
        // Sidebar no longer needs extra padding — nav only spans content area
      });
    }

    // IntersectionObserver to track active vendor card
    if (_snavObs) _snavObs.disconnect();
    _snavObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const name = e.target.dataset.vendor;
          document.querySelectorAll('.snav-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll(`.snav-btn[data-vendor="${CSS.escape(name)}"]`)
            .forEach(b => b.classList.add('active'));
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.vendor-card').forEach(c => _snavObs.observe(c));
  }

  // ── #8 insertVendorFilterBar ─────────────────────────────────────────────────
  function insertVendorFilterBar() {
    let targetH2 = null;
    for (const h2 of document.querySelectorAll('#content h2')) {
      if (/Competitive Positioning/i.test(h2.textContent)) { targetH2 = h2; break; }
    }
    if (!targetH2) return;

    // Remove existing bar if re-rendered
    const existing = document.getElementById('vendorFilterBar');
    if (existing) existing.remove();

    const bar = document.createElement('div');
    bar.id = 'vendorFilterBar';
    bar.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 20px;align-items:center;';
    bar.innerHTML =
      `<span style="font-size:10px;color:var(--color-text-muted);font-weight:700;letter-spacing:0.8px;text-transform:uppercase;">FILTER:</span>` +
      `<button class="vfbtn active" data-filter="all">All Vendors</button>` +
      `<button class="vfbtn" data-filter="commercial">Commercial</button>` +
      `<button class="vfbtn" data-filter="oss">OSS</button>` +
      `<button class="vfbtn" data-filter="leader">Leaders</button>` +
      `<button class="vfbtn" data-filter="challenger">Challengers</button>`;

    targetH2.parentNode.insertBefore(bar, targetH2);

    bar.querySelectorAll('.vfbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        bar.querySelectorAll('.vfbtn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _applyVendorFilter(btn.dataset.filter);
      });
    });
  }

  function _applyVendorFilter(filter) {
    [window._mqChart, window._gmqChart, window._waveChart].forEach(chart => {
      if (!chart) return;
      chart.data.datasets.forEach((ds, dsIdx) => {
        // Store original colours once
        const key = chart.canvas.id + '_' + dsIdx;
        if (!_origChartColors.has(key)) {
          _origChartColors.set(key, {
            bg:     ds.backgroundColor,
            border: ds.borderColor,
          });
        }
        const orig = _origChartColors.get(key);

        // Determine if this dataset matches the filter
        let match = false;
        if (filter === 'all') {
          match = true;
        } else {
          // For scatter/bubble charts: each dataset has a label (quadrant name) and
          // individual point labels. Check each point's label against exact sets.
          const pointLabels = ds.data.map(pt => pt.label || ds.label);
          if (filter === 'commercial') match = pointLabels.some(l => COMMERCIAL_LABELS.has(l));
          else if (filter === 'oss')   match = pointLabels.some(l => OSS_LABELS.has(l));
          else if (filter === 'leader')      match = pointLabels.some(l => LEADER_LABELS.has(l));
          else if (filter === 'challenger')  match = pointLabels.some(l => CHALLENGER_LABELS.has(l));
          // For line chart (Value Curve): dataset.label is the vendor name
          if (!match && COMMERCIAL_LABELS.has(ds.label)) {
            if (filter === 'commercial') match = true;
          }
          if (!match && OSS_LABELS.has(ds.label)) {
            if (filter === 'oss') match = true;
          }
          if (!match && LEADER_LABELS.has(ds.label)) {
            if (filter === 'leader') match = true;
          }
          if (!match && CHALLENGER_LABELS.has(ds.label)) {
            if (filter === 'challenger') match = true;
          }
        }

        if (match) {
          ds.backgroundColor = orig.bg;
          ds.borderColor     = orig.border;
        } else {
          // Append '22' alpha to hex colour for dimming, or use rgba fallback
          const bg = typeof orig.bg === 'string' && orig.bg.startsWith('#')
            ? orig.bg.slice(0, 7) + '22' : 'rgba(200,200,200,0.08)';
          const bd = typeof orig.border === 'string' && orig.border.startsWith('#')
            ? orig.border.slice(0, 7) + '22' : 'rgba(200,200,200,0.15)';
          ds.backgroundColor = bg;
          ds.borderColor     = bd;
        }
      });
      chart.update('none');
    });
  }

  // ── #7 wrapVendorNameLinks + comparison drawer ────────────────────────────────
  function wrapVendorNameLinks() {
    const content = document.getElementById('content');
    if (!content) return;

    const names = [...ALL_VENDORS].sort((a, b) => b.length - a.length);
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        let el = node.parentElement;
        while (el && el !== content) {
          if (['A','CODE','PRE','SCRIPT','STYLE','H1','H2','H3'].includes(el.tagName))
            return NodeFilter.FILTER_REJECT;
          if (el.classList && el.classList.contains('vname-link'))
            return NodeFilter.FILTER_REJECT;
          el = el.parentElement;
        }
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    const nodes = [];
    let nd;
    while ((nd = walker.nextNode())) nodes.push(nd);

    for (const tn of nodes) {
      let result = tn.textContent;
      let replaced = false;
      for (const name of names) {
        const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp(`\\b${escaped}\\b`, 'g');
        if (re.test(result)) {
          result = result.replace(
            new RegExp(`\\b${escaped}\\b`, 'g'),
            `<span class="vname-link" data-vendor="${name}">${name}</span>`
          );
          replaced = true;
        }
      }
      if (replaced) {
        const sp = document.createElement('span');
        sp.innerHTML = result;
        tn.parentNode.replaceChild(sp, tn);
      }
    }

    // Attach event listeners (no inline onclick)
    document.querySelectorAll('.vname-link').forEach(el => {
      el.addEventListener('click', () => _toggleCompare(el.dataset.vendor));
    });
  }

  function _showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => {
      t.classList.add('fade');
      setTimeout(() => t.remove(), 600);
    }, 2000);
  }

  function _toggleCompare(vendor) {
    if (_compareSet.has(vendor)) {
      _compareSet.delete(vendor);
      document.querySelectorAll(`.vname-link[data-vendor="${CSS.escape(vendor)}"]`)
        .forEach(el => el.style.background = '');
    } else {
      if (_compareSet.size >= 4) { _showToast('Max 4 vendors for comparison'); return; }
      _compareSet.add(vendor);
      document.querySelectorAll(`.vname-link[data-vendor="${CSS.escape(vendor)}"]`)
        .forEach(el => el.style.background = 'rgba(79,70,229,0.1)');
    }
    _updateCompareBadge();
    _renderCompareTable();
  }

  function _updateCompareBadge() {
    const badge = document.getElementById('compareBadge');
    if (!badge) return;
    if (_compareSet.size > 0) {
      badge.textContent = _compareSet.size;
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }
  }

  function _renderCompareTable() {
    const wrap = document.getElementById('compareTableWrap');
    if (!wrap) return;
    if (_compareSet.size === 0) {
      wrap.innerHTML = '<p style="font-size:12px;color:var(--color-text-muted);">Click vendor names in the report to add them here (max 4).</p>';
      return;
    }

    const vendors = [..._compareSet];
    const allVc = [...VC_COMMERCIAL, ...VC_OSS];
    const lookup = {};
    allVc.forEach(v => { lookup[v.label] = v.data; });
    VC_OSS.forEach(v => { lookup[v.label.replace(' (OSS)','')] = v.data; });

    const headerCols = vendors.map(v =>
      `<th style="padding:6px 8px;background:rgba(79,70,229,0.06);border:1px solid var(--color-border);text-align:center;color:var(--color-text-primary);">${v}</th>`
    ).join('');

    const bodyRows = VC_KCFS.map((kcf, i) => {
      const cells = vendors.map(v => {
        const data  = lookup[v];
        const score = data ? data[i] : null;
        const bg    = score !== null ? (SCORE_BG[score] || '#f8fafc') : '#f8fafc';
        return `<td style="padding:6px 8px;border:1px solid var(--color-border);text-align:center;background:${bg};color:var(--color-text-primary);">${score !== null ? score : '—'}</td>`;
      }).join('');
      return `<tr><td style="padding:6px 8px;border:1px solid var(--color-border);font-weight:500;color:var(--color-text-secondary);">${kcf}</td>${cells}</tr>`;
    }).join('');

    const removeLinks = vendors.map(v =>
      `<span class="cmp-remove" data-vendor="${v}" style="margin-right:8px;cursor:pointer;color:var(--color-error);font-size:12px;">✕ ${v}</span>`
    ).join('');

    wrap.innerHTML =
      `<div style="margin-bottom:10px;">${removeLinks}</div>` +
      `<table style="width:100%;border-collapse:collapse;font-size:12px;">` +
      `<thead><tr><th style="text-align:left;padding:6px 8px;background:rgba(79,70,229,0.06);border:1px solid var(--color-border);color:var(--color-text-primary);">KCF</th>${headerCols}</tr></thead>` +
      `<tbody>${bodyRows}</tbody></table>`;

    wrap.querySelectorAll('.cmp-remove').forEach(el => {
      el.addEventListener('click', () => _toggleCompare(el.dataset.vendor));
    });
  }

  // ── #11 setupChartObserver ───────────────────────────────────────────────────
  function setupChartObserver() {
    if (_chartObs) _chartObs.disconnect();
    _chartObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in-view');
          _chartObs.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -5% 0px' });
    document.querySelectorAll('.chart-frame').forEach(el => _chartObs.observe(el));
  }

  // ── #12 setupBreadcrumbObserver (scroll-based for reliability) ──────────────
  let _bcScrollHandler = null;
  function setupBreadcrumbObserver() {
    // Remove previous handler if exists
    if (_bcScrollHandler) {
      window.removeEventListener('scroll', _bcScrollHandler, true);
      window.removeEventListener('scrolltick', _bcScrollHandler);
    }

    // Collect all visible H2/H3 from content
    const headings = Array.from(document.querySelectorAll('#content h2, #content h3'))
      .filter(h => h.offsetParent !== null); // only visible ones

    _bcScrollHandler = function() {
      const navH = document.getElementById('solutionNav')?.offsetHeight || 125;
      const threshold = navH + 40;
      let curH2 = '', curH3 = '';
      for (const h of headings) {
        const top = h.getBoundingClientRect().top;
        if (top > threshold) break;
        if (h.tagName === 'H2') {
          curH2 = h.textContent.replace(/^[▸▾]\s*/, '').trim();
          curH3 = '';
        } else if (h.tagName === 'H3') {
          curH3 = h.textContent.replace(/^[▸▾]\s*/, '').trim();
        }
      }
      if (_bcSection) _bcSection.textContent = curH2;
      if (_bcSub)     _bcSub.textContent = curH3;
      if (_bcSep)     _bcSep.style.display = curH3 ? 'inline' : 'none';
    };
    window.addEventListener('scroll', _bcScrollHandler, { passive: true });
    window.addEventListener('scrolltick', _bcScrollHandler); // fallback for sandboxed envs
    // Fire once immediately
    _bcScrollHandler();
  }

})();
</script>
